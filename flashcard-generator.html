<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Flashcard Generator</title>

<!--
  ============================================================
  HARDCODE YOUR API KEY HERE (optional):
  Find the line below that says:
    const HARDCODED_API_KEY = "";
  and paste your key between the quotes:
    const HARDCODED_API_KEY = "sk-ant-api03-...";
  This removes the need to type it each session.
  WARNING: Do NOT commit this file to a public GitHub repo
  with your key inside — anyone can see it.
  ============================================================
-->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3248;
    --accent: #6c63ff;
    --accent-hover: #7c74ff;
    --accent-dim: rgba(108,99,255,0.15);
    --text: #e8e9f0;
    --text-muted: #8b8fa8;
    --text-dim: #555970;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --card-h: 220px;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #a78bfa, #6c63ff, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.4rem;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .card-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-section label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }

  .api-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .api-note {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }

  input[type="password"],
  input[type="text"],
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  input[type="password"]:focus,
  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    min-height: 160px;
    line-height: 1.6;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.65rem 1.4rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    border-radius: 10px;
    margin-top: 0.25rem;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-got-it {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
    flex: 1;
  }

  .btn-got-it:hover {
    background: rgba(34,197,94,0.2);
  }

  .btn-still-learning {
    background: var(--amber-dim);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.25);
    flex: 1;
  }

  .btn-still-learning:hover {
    background: rgba(245,158,11,0.2);
  }

  .btn-reset {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 0.85rem;
    padding: 0.55rem 1.1rem;
  }

  .btn-reset:hover {
    background: var(--border);
    color: var(--text);
  }

  /* ── Spinner ── */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Error banner ── */
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    color: #fca5a5;
    font-size: 0.88rem;
    display: none;
    margin-bottom: 1.25rem;
  }

  .error-banner.show { display: flex; gap: 0.6rem; align-items: flex-start; }

  /* ── Progress bar ── */
  .progress-section {
    display: none;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  .progress-section.show { display: flex; }

  .progress-label {
    font-size: 0.88rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-count {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  /* ── Flashcard grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.1rem;
  }

  /* ── Flashcard flip ── */
  .card-wrap {
    perspective: 1000px;
    height: var(--card-h);
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-wrap.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 1.25rem 1.4rem;
    display: flex;
    flex-direction: column;
  }

  .card-front {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .card-back {
    background: var(--surface2);
    border: 1px solid var(--accent);
    transform: rotateY(180deg);
  }

  .card-wrap.known .card-front {
    border-color: rgba(34,197,94,0.4);
    background: linear-gradient(135deg, var(--surface), rgba(34,197,94,0.05));
  }

  .card-wrap.known .card-back {
    border-color: rgba(34,197,94,0.4);
  }

  .card-tag {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 0.6rem;
  }

  .card-front .card-tag { color: var(--accent); }
  .card-back .card-tag { color: var(--text-muted); }

  .card-text {
    flex: 1;
    display: flex;
    align-items: center;
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--text);
  }

  .card-hint {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    margin-top: 0.5rem;
  }

  .card-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.75rem;
    font-size: 0.82rem;
  }

  .known-badge {
    display: none;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--green);
    background: var(--green-dim);
    border-radius: 99px;
    padding: 0.2rem 0.55rem;
    margin-left: auto;
    align-items: center;
    gap: 0.25rem;
  }

  .card-wrap.known .known-badge { display: inline-flex; }

  /* ── Congrats banner ── */
  .congrats {
    display: none;
    text-align: center;
    padding: 2.5rem 1rem;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
  }

  .congrats.show { display: block; }

  .congrats h2 {
    font-size: 1.6rem;
    margin-bottom: 0.4rem;
  }

  .congrats p {
    color: var(--text-muted);
    margin-bottom: 1.2rem;
  }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    header h1 { font-size: 1.5rem; }
    .cards-grid { grid-template-columns: 1fr; }
    :root { --card-h: 200px; }
  }

  /* ── Card entrance animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-wrap {
    animation: fadeUp 0.35s ease both;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>⚡ AI Flashcard Generator</h1>
    <p>Paste any text — get study-ready flashcards in seconds</p>
  </header>

  <!-- API Key -->
  <div class="card-section">
    <label>Anthropic API Key</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
    </div>
    <div class="api-note">🔒 Stored in memory only — never sent anywhere except the Anthropic API.</div>
  </div>

  <!-- Text input -->
  <div class="card-section">
    <label>Your Notes or Text</label>
    <textarea id="inputText" placeholder="Paste your notes, article, study material, or any block of text here..."></textarea>
  </div>

  <!-- Generate button -->
  <button class="btn btn-primary" id="generateBtn" onclick="generateFlashcards()">
    ✦ Generate Flashcards
  </button>

  <!-- Error -->
  <div class="error-banner" id="errorBanner">
    <span>⚠</span>
    <span id="errorText"></span>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="progress-label">Progress</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-count" id="progressCount">0 / 0</div>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset deck</button>
  </div>

  <!-- Congrats -->
  <div class="congrats" id="congratsBanner">
    <h2>🎉 Deck complete!</h2>
    <p>You marked all cards as known. Nice work.</p>
    <button class="btn btn-reset" onclick="resetDeck()" style="display:inline-flex;">↺ Start over</button>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid"></div>

</div>

<script>
  // ============================================================
  // HARDCODE YOUR API KEY HERE (optional):
  // Replace the empty string with your key to skip typing it.
  // NEVER push this file to a public repo with your key inside.
  // ============================================================
  const HARDCODED_API_KEY = "";

  let flashcards = [];
  let known = new Set();

  window.addEventListener('DOMContentLoaded', () => {
    if (HARDCODED_API_KEY) {
      document.getElementById('apiKey').value = HARDCODED_API_KEY;
    }
  });

  function showError(msg) {
    const banner = document.getElementById('errorBanner');
    document.getElementById('errorText').textContent = msg;
    banner.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorBanner').classList.remove('show');
  }

  function setLoading(on) {
    const btn = document.getElementById('generateBtn');
    if (on) {
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Generating…';
    } else {
      btn.disabled = false;
      btn.innerHTML = '✦ Generate Flashcards';
    }
  }

  async function generateFlashcards() {
    hideError();
    const apiKey = document.getElementById('apiKey').value.trim();
    const text   = document.getElementById('inputText').value.trim();

    if (!apiKey) return showError('Please enter your Anthropic API key above.');
    if (text.length < 30) return showError('Please paste at least a sentence or two of content.');

    setLoading(true);
    document.getElementById('cardsGrid').innerHTML = '';
    document.getElementById('progressSection').classList.remove('show');
    document.getElementById('congratsBanner').classList.remove('show');
    flashcards = [];
    known.clear();

    const prompt = `You are a flashcard generator. Read the text below and create between 5 and 10 high-quality flashcards to help someone study and retain the key concepts.

Rules:
- Each card tests ONE clear concept
- Questions should be specific and unambiguous
- Answers should be concise (1-3 sentences max)
- Cover the most important ideas in the text
- Vary question types (what, why, how, define, compare)

Return ONLY a raw JSON array — no markdown, no code fences, no explanation. Format:
[{"question":"...","answer":"..."},{"question":"...","answer":"..."}]

Text to study:
"""
${text.slice(0, 6000)}
"""`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTP ${response.status}`;
        throw new Error(msg);
      }

      const data = await response.json();
      const raw = data.content?.[0]?.text || '';

      let parsed;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch {
        throw new Error('Claude returned unexpected output. Try again or shorten your text.');
      }

      if (!Array.isArray(parsed) || parsed.length === 0) {
        throw new Error('No flashcards returned. Try with more detailed content.');
      }

      flashcards = parsed;
      renderCards();

    } catch (e) {
      showError(e.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  }

  function renderCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';

    flashcards.forEach((fc, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap' + (known.has(i) ? ' known' : '');
      wrap.style.animationDelay = `${i * 55}ms`;
      wrap.dataset.index = i;

      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">
            <div style="display:flex;align-items:center;">
              <span class="card-tag">Question ${i + 1}</span>
              <span class="known-badge">✓ Got it</span>
            </div>
            <div class="card-text">${escHtml(fc.question)}</div>
            <div class="card-hint">Tap to reveal answer</div>
          </div>
          <div class="card-face card-back">
            <div class="card-tag">Answer</div>
            <div class="card-text">${escHtml(fc.answer)}</div>
            <div class="card-actions">
              <button class="btn btn-got-it"      onclick="markCard(event,${i},true)">Got it ✓</button>
              <button class="btn btn-still-learning" onclick="markCard(event,${i},false)">Still learning ↺</button>
            </div>
          </div>
        </div>
      `;

      wrap.addEventListener('click', toggleFlip);
      grid.appendChild(wrap);
    });

    updateProgress();
    document.getElementById('progressSection').classList.add('show');
  }

  function toggleFlip(e) {
    if (e.target.tagName === 'BUTTON') return;
    this.classList.toggle('flipped');
  }

  function markCard(e, index, isKnown) {
    e.stopPropagation();
    if (isKnown) {
      known.add(index);
    } else {
      known.delete(index);
    }

    const wrap = document.querySelector(`.card-wrap[data-index="${index}"]`);
    if (wrap) {
      wrap.classList.toggle('known', isKnown);
      setTimeout(() => {
        wrap.classList.remove('flipped');
      }, 300);
    }

    updateProgress();
  }

  function updateProgress() {
    const total = flashcards.length;
    const count = known.size;
    const pct   = total ? Math.round((count / total) * 100) : 0;

    document.getElementById('progressCount').textContent = `${count} / ${total}`;
    document.getElementById('progressFill').style.width  = pct + '%';

    if (total > 0 && count === total) {
      document.getElementById('congratsBanner').classList.add('show');
    } else {
      document.getElementById('congratsBanner').classList.remove('show');
    }
  }

  function resetDeck() {
    known.clear();
    document.querySelectorAll('.card-wrap').forEach(w => {
      w.classList.remove('known', 'flipped');
    });
    updateProgress();
    document.getElementById('congratsBanner').classList.remove('show');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // Allow Ctrl+Enter / Cmd+Enter to generate
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateFlashcards();
  });
</script>
</body>
</html>
